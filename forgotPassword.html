<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | Batra Hedge</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    font-family:'Inter',sans-serif;
}

.box{
    width:400px;
    background:#111;
    padding:40px;
    color:white;
    border:1px solid #333;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-family:'Cinzel', serif;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    background:black;
    border:1px solid #333;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:white;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:15px;
}

button:hover{
    background:#ccc;
}

button:disabled{
    background:#555;
    color:#888;
    cursor:not-allowed;
}

#message{
    text-align:center;
    margin-top:15px;
    color:white;
}

.success{
    color:#4CAF50;
}

.error{
    color:#f44336;
}

a{
    color:white;
    text-decoration:none;
}

.back{
    text-align:center;
    margin-top:20px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="box">

    <h1>Forgot Password</h1>

    <!-- STEP 1: EMAIL -->
    <div id="step1">
        <input 
            type="email" 
            id="email" 
            placeholder="Enter your email"
        >
        <button onclick="sendOTP()">
            Send OTP
        </button>
    </div>

    <!-- STEP 2: VERIFY OTP -->
    <div id="step2" class="hidden">
        <input 
            type="text" 
            id="otp" 
            placeholder="Enter OTP"
            maxlength="6"
        >
        <button onclick="verifyOTP()">
            Verify OTP
        </button>
        <button onclick="resendOTP()" style="background:#333; color:white;">
            Resend OTP
        </button>
    </div>

    <!-- STEP 3: RESET PASSWORD -->
    <div id="step3" class="hidden">
        <input 
            type="password" 
            id="newPassword" 
            placeholder="Enter New Password"
        >
        <input 
            type="password" 
            id="confirmPassword" 
            placeholder="Confirm New Password"
        >
        <button onclick="resetPassword()">
            Reset Password
        </button>
    </div>

    <p id="message"></p>

    <div class="back">
        <a href="login.html">Back to Login</a>
    </div>

</div>

<script>

let userEmail = "";

/////////////////////////////////////////////////
// STEP 1: SEND OTP
/////////////////////////////////////////////////

async function sendOTP(){

    const email = document.getElementById("email").value;

    if(!email){
        showMessage("Please enter your email", "error");
        return;
    }

    try{

        const response = await fetch(
            "https://batra-backend.onrender.com/sendOTP",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({ email })
            }
        );

        const data = await response.json();

        if(response.ok){
            userEmail = email;
            showMessage(data.message, "success");
            
            // SHOW STEP 2
            document.getElementById("step1").classList.add("hidden");
            document.getElementById("step2").classList.remove("hidden");
        }
        else{
            showMessage(data.message, "error");
        }

    }
    catch(error){
        console.log(error);
        showMessage("Server Error", "error");
    }

}

/////////////////////////////////////////////////
// RESEND OTP
/////////////////////////////////////////////////

async function resendOTP(){
    const email = document.getElementById("email").value;
    await sendOTPRequest(email);
}

async function sendOTPRequest(email){
    try{
        const response = await fetch(
            "https://batra-backend.onrender.com/sendOTP",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({ email })
            }
        );

        const data = await response.json();
        showMessage(data.message, response.ok ? "success" : "error");
    }
    catch(error){
        console.log(error);
        showMessage("Server Error", "error");
    }
}

/////////////////////////////////////////////////
// STEP 2: VERIFY OTP
/////////////////////////////////////////////////

async function verifyOTP(){

    const otp = document.getElementById("otp").value;

    if(!otp || otp.length !== 6){
        showMessage("Please enter a valid 6-digit OTP", "error");
        return;
    }

    // OTP verification happens on server during password reset
    // For now, just move to next step
    showMessage("OTP verified! Now set your new password", "success");
    
    // SHOW STEP 3
    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.remove("hidden");

}

/////////////////////////////////////////////////
// STEP 3: RESET PASSWORD
/////////////////////////////////////////////////

async function resetPassword(){

    const email = document.getElementById("email").value;
    const otp = document.getElementById("otp").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    // VALIDATION
    if(!newPassword || !confirmPassword){
        showMessage("Please fill all fields", "error");
        return;
    }

    if(newPassword !== confirmPassword){
        showMessage("Passwords do not match", "error");
        return;
    }

    if(newPassword.length < 6){
        showMessage("Password must be at least 6 characters", "error");
        return;
    }

    try{

        const response = await fetch(
            "https://batra-backend.onrender.com/resetPassword",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body: JSON.stringify({
                    email,
                    otp,
                    newPassword
                })
            }
        );

        const data = await response.json();

        if(response.ok){
            showMessage(data.message, "success");
            setTimeout(()=>{
                window.location.href = "login.html";
            }, 2000);
        }
        else{
            showMessage(data.message, "error");
        }

    }
    catch(error){
        console.log(error);
        showMessage("Server Error", "error");
    }

}

/////////////////////////////////////////////////
// HELPER: SHOW MESSAGE
/////////////////////////////////////////////////

function showMessage(msg, type){
    const messageEl = document.getElementById("message");
    messageEl.innerText = msg;
    messageEl.className = type;
}

</script>

</body>
</html>
